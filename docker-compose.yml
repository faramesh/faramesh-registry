services:
  registry:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9876:9876"
    volumes:
      - ./catalog:/app/catalog:ro
    command: ["-catalog", "/app/catalog", "-listen", "0.0.0.0:9876"]

  # Web UI disabled — use GitHub catalog + `faramesh registry` CLI (see PRODUCTION_STATUS.md).
