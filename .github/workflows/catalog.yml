name: catalog

on:
  push:
    paths:
      - "catalog/**"
      - "scripts/**"
      - "internal/**"
      - "cmd/**"
  pull_request:
    paths:
      - "catalog/**"
      - "scripts/**"
      - "internal/**"
      - "cmd/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Validate catalog (FPL-primary)
        run: ./scripts/validate-catalog.sh
      - name: Go test
        run: go test ./...
      - name: Sign catalog (requires REGISTRY_SIGNING_KEY_B64 secret)
        env:
          REGISTRY_SIGNING_KEY_B64: ${{ secrets.REGISTRY_SIGNING_KEY_B64 }}
        run: |
          if [ -n "${REGISTRY_SIGNING_KEY_B64:-}" ]; then
            go run ./cmd/sign-catalog -catalog catalog
            go run ./cmd/sign-catalog -catalog catalog -providers
          else
            echo "::warning::REGISTRY_SIGNING_KEY_B64 not set — see SETUP_SIGNING.md"
          fi
      - name: E2E smoke (GitHub resolver)
        run: ./scripts/e2e-catalog.sh
